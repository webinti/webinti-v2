# Webinti — nginx config for Hostinger VPS
# Drop into: /etc/nginx/sites-available/webinti.com
# Then: ln -s /etc/nginx/sites-available/webinti.com /etc/nginx/sites-enabled/
# Test:  nginx -t
# Reload: systemctl reload nginx

# ─────────────────────────────────────────────────────────────
# 1. Force www → apex (canonical = webinti.com without www)
# ─────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name www.webinti.com;
    return 301 https://webinti.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.webinti.com;
    # SSL certs (Let's Encrypt managed by certbot — same cert for apex + www)
    ssl_certificate     /etc/letsencrypt/live/webinti.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/webinti.com/privkey.pem;
    return 301 https://webinti.com$request_uri;
}

# ─────────────────────────────────────────────────────────────
# 2. HTTP → HTTPS apex
# ─────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name webinti.com;
    return 301 https://webinti.com$request_uri;
}

# ─────────────────────────────────────────────────────────────
# 3. Main HTTPS server
# ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name webinti.com;

    root /var/www/webinti/dist;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/webinti.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/webinti.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header X-Content-Type-Options       "nosniff" always;
    add_header X-Frame-Options              "SAMEORIGIN" always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy           "interest-cohort=()" always;
    add_header Strict-Transport-Security    "max-age=63072000; includeSubDomains; preload" always;

    # Gzip / Brotli (if module installed)
    gzip on;
    gzip_types text/plain text/css text/xml application/javascript application/json image/svg+xml;
    gzip_vary on;

    # Long cache for static assets, short cache for HTML
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|jpg|jpeg|png|webp|avif|gif|svg|ico|glb|gltf|mp4|webm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.html$ {
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }

    # ─────────────────────────────────────────────────────
    # 301 REDIRECTS — Webflow legacy → Astro new structure
    # ─────────────────────────────────────────────────────

    # — Pages métier conservées (slugs identiques pour SEO max) —
    rewrite ^/agence-bubble-france/?$                                       /agence-bubble-france/                       permanent;

    # — Pages métier remappées —
    rewrite ^/developpement-mobile-ios-et-android/?$                        /expertise/developpement-mobile/             permanent;
    rewrite ^/nos-formations/?$                                             /expertise/formations/                       permanent;
    rewrite ^/projets/?$                                                    /showcase/                                   permanent;
    rewrite ^/pourquoi-travailler-avec-webinti/?$                           /                                            permanent;
    rewrite ^/about-us/?$                                                   /                                            permanent;

    # — Anciennes pages formations spécifiques —
    rewrite ^/formation-bubble/?$                                           /expertise/formations/                       permanent;
    rewrite ^/formation-flutterflow-concevoir-une-application-mobile-ios-et-android-sans-code/?$  /expertise/formations/  permanent;
    rewrite ^/formation-stripe-maitriser-lenvironnement-stripe-pour-votre-application-bubble/?$    /expertise/formations/  permanent;
    rewrite ^/formation-bubble-niveau-avance-marketplace-vinted/?$          https://academy.webinti.com/formation/clone-vinted-niveau-intermediaire-bubble  permanent;

    # — Contact & RDV —
    rewrite ^/contact/?$                                                    https://rdv.webinti.com/tim/parlons-de-votre-projet  permanent;

    # — FAQ & mentions —
    rewrite ^/mentions-legales/?$                                           /mentions-legales/                           permanent;
    rewrite ^/faq/?$                                                        /faq/                                        permanent;

    # — Tutoriels → YouTube channel (no SEO value to keep them on-site) —
    rewrite ^/expertise/tutoriels/?$                                        https://www.youtube.com/@WebintiNoCode       permanent;
    rewrite ^/tutoriels/?$                                                  https://www.youtube.com/@WebintiNoCode       permanent;

    # — Auth pages → Academy login —
    rewrite ^/(sign-in|sign-up|forgot-password|reset-password)/?$           https://academy.webinti.com                  permanent;

    # — Webflow template pages (no SEO value) → home —
    rewrite ^/(old-home|home-v[0-9]+|features-[0-9]+|pricing-[0-9a-z-]+|checkout|paypal-checkout|order-confirmation|career|career/.*|integration|integration/.*|category/.*|product/.*|utility-pages/.*|data-deletion)/?$  /  permanent;

    # — Blog (Webflow placeholders, no real content) → home —
    rewrite ^/blog(/.*)?$                                                   /                                            permanent;

    # ─────────────────────────────────────────────────────
    # Astro static — clean URLs (trailing slash via Astro config)
    # ─────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # robots.txt + sitemap + llms.txt — no special handling needed (served as static)

    # 404
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
